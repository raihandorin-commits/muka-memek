<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muka Memek - Galeri Foto dan Musik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Muka Memek</h1>
            <p class="subtitle">Galeri Foto & Musik Terbaik</p>
        </header>

        <!-- Musik Player -->
        <section class="music-player">
            <h2>🎵 Putar Musik</h2>
            <audio controls>
                <source src="WhatsApp Audio 2026-07-06 at 00.53.16.mpeg" type="audio/mpeg">
                Browser Anda tidak mendukung elemen audio.
            </audio>
            <p class="music-info">Musik Favorit</p>
        </section>

        <!-- Galeri Foto -->
        <section class="gallery">
            <h2>📷 Galeri Foto</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="WhatsApp Image 2026-07-06 at 00.42.10.jpeg" alt="Foto 1">
                    <div class="overlay">Foto</div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Muka Memek. Semua hak dilindungi.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
